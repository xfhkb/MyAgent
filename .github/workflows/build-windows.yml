name: Build Windows Agent

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        config:
          - name: x64-Service
            platform: x64
            project: meshservice/MeshService-2022.vcxproj
            output: meshservice/Release/MeshService64.exe
          - name: x86-Service
            platform: Win32
            project: meshservice/MeshService-2022.vcxproj
            output: meshservice/Release/MeshService.exe
          - name: x64-Console
            platform: x64
            project: meshconsole/MeshConsole-2022.vcxproj
            output: meshconsole/Release/MeshConsole64.exe
          - name: x86-Console
            platform: Win32
            project: meshconsole/MeshConsole-2022.vcxproj
            output: meshconsole/Release/MeshConsole.exe

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build ${{ matrix.config.name }}
      run: |
        msbuild "${{ matrix.config.project }}" /p:Configuration=Release /p:Platform="${{ matrix.config.platform }}" /m

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MeshAgent-${{ matrix.config.name }}
        path: ${{ matrix.config.output }}
